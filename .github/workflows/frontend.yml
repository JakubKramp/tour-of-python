name: frontend

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  ci:
    name: lint, typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run check

      - name: Build
        run: bun run build